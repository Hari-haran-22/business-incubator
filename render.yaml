# render.yaml — Infrastructure as Code for Render
# Docs: https://render.com/docs/infrastructure-as-code
#
# HOW TO USE:
#   1. Push this file to your repo root.
#   2. In the Render dashboard → New → "Blueprint" → connect your repo.
#   3. Render reads this file and creates the service automatically.

services:
  - type: web
    name: business-inc
    runtime: docker           # tells Render to use your Dockerfile
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon            # change to: oregon | frankfurt | singapore | ohio
    plan: free                # free | starter | standard | pro
    branch: main

    # Health check — Render marks the deploy healthy only after this passes
    healthCheckPath: /api/health

    # Auto-deploy every time main is pushed
    autoDeploy: true

    # Environment variables
    # Set SECRET values in the Render dashboard (never commit real values here)
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      # ── Set these in the Render dashboard ──────────────────────────────
      - key: MONGODB_URI
        sync: false           # "sync: false" = you must set this manually in dashboard

      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRE
        value: 7d

      - key: RESET_PASSWORD_EXPIRE_MINUTES
        value: "15"

      - key: CLIENT_ORIGIN
        value: https://business-inc.onrender.com

      - key: ADMIN_NAME
        sync: false

      - key: ADMIN_EMAIL
        sync: false

      - key: ADMIN_PASSWORD
        sync: false
