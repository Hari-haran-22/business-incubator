version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: business-inc-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/business-incubator
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      RESET_PASSWORD_EXPIRE_MINUTES: ${RESET_PASSWORD_EXPIRE_MINUTES:-15}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5000}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - business-inc-net

  mongo:
    image: mongo:7-jammy
    container_name: business-inc-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - business-inc-net
    # Expose only on localhost for safety; remove in fully-isolated environments
    ports:
      - "27017:27017"

volumes:
  mongo_data:

networks:
  business-inc-net:
    driver: bridge
